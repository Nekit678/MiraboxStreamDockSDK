name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install SDK and development tools
        run: python -m pip install -e ".[dev]"

      - name: Check formatting and lint
        run: |
          ruff format --check src tests scripts examples
          ruff check src tests scripts examples

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v
          python -m unittest discover -s examples/counter_plugin/tests -v
        env:
          PYTHONPATH: examples/counter_plugin/src

      - name: Compile Python sources
        run: python -m compileall -q src tests scripts examples

  package:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: python -m pip install ".[dev]"

      - name: Build wheel and source archive
        run: python -m build

      - name: Verify distribution contents
        run: python scripts/verify_distribution.py dist

      - name: Check package metadata and README rendering
        run: python -m twine check dist/*

      - name: Test installation from wheel
        run: |
          python -m pip uninstall -y mirabox-stream-dock-sdk
          python -m pip install --no-deps dist/*.whl
          python -c "from importlib.metadata import version; import mirabox_sdk; assert mirabox_sdk.__version__ == version('mirabox-stream-dock-sdk')"
          mirabox-sdk copy-property-inspector build/property-inspector

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 14
